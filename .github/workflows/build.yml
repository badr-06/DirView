name: CI

on:
  push:
    branches: [ "main"]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update
          sudo apt-get install -y
          cmake
          qtbase5-dev
          qtbase5-examples
          build-essential

    - name: Build with CMake
      run: mkdir -p build
          make

